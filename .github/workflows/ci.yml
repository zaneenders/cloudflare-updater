name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Static SDK
    runs-on: ubuntu-latest
    container: swift:latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Static SDK
        run: |
          swift sdk install https://download.swift.org/swift-6.3.2-release/static-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz --checksum 3fd798bef6f4408f1ea5a6f94ce4d4052830c4326ab85ebc04f983f01b3da407
      - name: Build x86_64
        run: swift build --swift-sdk x86_64-swift-linux-musl -c release
      - name: Build aarch64
        run: swift build --swift-sdk aarch64-swift-linux-musl -c release
      - name: Upload x86_64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-updater-x86_64
          path: |
            .build/x86_64-swift-linux-musl/release/CloudFlareUpdater
            .build/x86_64-swift-linux-musl/release/CreateCNAMERecord
            .build/x86_64-swift-linux-musl/release/SyncICloudMailDNS
      - name: Upload aarch64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-updater-aarch64
          path: |
            .build/aarch64-swift-linux-musl/release/CloudFlareUpdater
            .build/aarch64-swift-linux-musl/release/CreateCNAMERecord
            .build/aarch64-swift-linux-musl/release/SyncICloudMailDNS

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cloudflare-updater-*
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cloudflare-updater-x86_64/*
            cloudflare-updater-aarch64/*
          generate_release_notes: true
